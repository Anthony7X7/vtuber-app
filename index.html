<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Mobile - AudioWorklet Core</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 40px; margin: 0; }
        button { font-size: 20px; padding: 20px 40px; border-radius: 12px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); margin-top: 20px; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        #estado { margin-top: 30px; font-size: 18px; color: #aaa; }
        #logBox { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #00ff88; text-align: left; height: 250px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <h2>🎙️ Walkie-Talkie Pro (Worklet)</h2>
    <p style="color: #00ff88; font-size: 12px;">Arquitectura: AWS Core + AudioWorklet Thread</p>
    
    <button id="btnConectar">CONECTAR A LA BASE</button>
    <p id="estado">Esperando conexión...</p>
    
    <div id="logBox">Sistemas en espera...<br></div>

    <script>
        const AWS_WSS_URL = "wss://footage-downloaded-trades-earliest.trycloudflare.com";
        
        let wsAWS;
        let playContext, captureContext;
        let nextPlayTime = 0; 

        function log(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        // --- EL TRUCO DEL AUDIO WORKLET EN UN SOLO ARCHIVO ---
        const workletCode = `
            class MicProcessor extends AudioWorkletProcessor {
                process(inputs) {
                    const input = inputs[0];
                    if (input && input.length > 0) {
                        const channelData = input[0];
                        const pcmData = new Int16Array(channelData.length);
                        for (let i = 0; i < channelData.length; i++) {
                            pcmData[i] = Math.max(-1, Math.min(1, channelData[i])) * 0x7FFF;
                        }
                        this.port.postMessage(pcmData.buffer);
                    }
                    return true;
                }
            }
            registerProcessor('mic-processor', MicProcessor);
        `;
        const workletBlob = new Blob([workletCode], { type: 'application/javascript' });
        const workletUrl = URL.createObjectURL(workletBlob);
        // -----------------------------------------------------

        document.getElementById('btnConectar').addEventListener('click', async () => {
            document.getElementById('btnConectar').disabled = true;
            log("Iniciando motores de alto rendimiento...");
            
            playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            if (playContext.state === 'suspended') await playContext.resume();

            wsAWS = new WebSocket(AWS_WSS_URL);
            
            wsAWS.onopen = () => {
                log("✅ Conectado a AWS.");
                document.getElementById('estado').innerText = "🟢 SISTEMA EN LÍNEA";
                document.getElementById('estado').style.color = "#00ff88";
                iniciarMicrofono();
            };

            wsAWS.onmessage = async (event) => {
                const mensaje = JSON.parse(event.data);
                if (mensaje.tipo === 'log') log(mensaje.payload);
                if (mensaje.tipo === 'audio') reproducirAudioBase64(mensaje.payload);
            };

            wsAWS.onerror = () => log("❌ Falló la conexión con AWS.");
            wsAWS.onclose = () => {
                document.getElementById('estado').innerText = "🔴 Base Desconectada";
                document.getElementById('estado').style.color = "#ff4444";
                document.getElementById('btnConectar').disabled = false;
            };
        });

        async function iniciarMicrofono() {
            try {
                // OJO: Dejo el EchoCancellation en TRUE. Si usas audífonos siempre, ponlo en false como dijo Claude.
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 } 
                });
                log("🎙️ Micrófono en hilo dedicado (AudioWorklet)...");

                captureContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                await captureContext.resume();
                
                await captureContext.audioWorklet.addModule(workletUrl);
                
                const source = captureContext.createMediaStreamSource(stream);
                const processorNode = new AudioWorkletNode(captureContext, 'mic-processor');

                processorNode.port.onmessage = (e) => {
                    if (wsAWS && wsAWS.readyState === WebSocket.OPEN) {
                        const base64Audio = btoa(String.fromCharCode(...new Uint8Array(e.data)));
                        wsAWS.send(JSON.stringify({ tipo: 'audio_mic', payload: base64Audio }));
                    }
                };

                source.connect(processorNode);
                // No conectamos el processorNode al 'destination' para no escucharnos a nosotros mismos
                
            } catch (err) {
                log("❌ Error de micrófono: " + err.message);
                alert("Permisos de micrófono denegados.");
            }
        }

        async function reproducirAudioBase64(base64String) {
            try {
                const binaryString = window.atob(base64String);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 32768.0; 

                const audioBuffer = playContext.createBuffer(1, float32Array.length, 24000);
                audioBuffer.getChannelData(0).set(float32Array);

                const source = playContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(playContext.destination);
                
                if (nextPlayTime < playContext.currentTime) nextPlayTime = playContext.currentTime;
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
            } catch (e) {
                console.error("Error reproduciendo", e);
            }
        }
    </script>
</body>
</html>
