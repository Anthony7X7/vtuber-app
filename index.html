<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber - Interfaz Móvil</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 40px; margin: 0; }
        button { font-size: 20px; padding: 20px 40px; border-radius: 12px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); }
        button:active { transform: scale(0.95); }
        #estado { margin-top: 30px; font-size: 18px; color: #aaa; }
        #logBox { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; color: #00ff88; text-align: left; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
    <h2>🎙️ Departamento de Voz Móvil</h2>
    <button id="btnConectar">Conectar Sistema</button>
    <p id="estado">Esperando conexión...</p>
    
    <div id="logBox">Consola de eventos...<br></div>

    <script>
        // 🚨 REEMPLAZA ESTO CON TU URL DE CLOUDFLARE
        // CRUCIAL: Debe empezar con wss:// (No https://)
        const AWS_WSS_URL = "wss://doctor-expenses-understand-manufacture.trycloudflare.com";
        
        let wsAWS;
        let audioContext;
        let ticketId = 0;
        let tiempoUltimaFrase = Date.now();
        let recon = null;

        function log(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('btnConectar').addEventListener('click', async () => {
            document.getElementById('estado').innerText = "Conectando al puente AWS...";
            document.getElementById('estado').style.color = "#ffaa00";
            
            // Iniciar motor de audio de Chrome (requiere interacción del usuario)
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            
            // Conectar al puente de AWS
            wsAWS = new WebSocket(AWS_WSS_URL);
            
            wsAWS.onopen = () => {
                document.getElementById('estado').innerText = "🟢 Sistema Enlazado. ¡Habla!";
                document.getElementById('estado').style.color = "#00ff88";
                log("Conexión WSS establecida con AWS.");
                iniciarEscucha();
            };

            wsAWS.onmessage = async (event) => {
                const mensaje = JSON.parse(event.data);
                if (mensaje.tipo === 'audio') {
                    log("🔊 Audio recibido de Inworld (Reproduciendo...)");
                    reproducirAudioBase64(mensaje.payload);
                }
            };

            wsAWS.onclose = () => {
                document.getElementById('estado').innerText = "🔴 Desconectado de AWS";
                document.getElementById('estado').style.color = "#ff4444";
                log("Error: Conexión cerrada.");
            };
        });

        function iniciarEscucha() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                log("⚠️ Tu navegador no soporta SpeechRecognition. Usa Chrome.");
                return;
            }

            recon = new SpeechRecognition();
            recon.continuous = true;
            recon.interimResults = false;
            recon.lang = 'es-ES';

            recon.onresult = (event) => {
                const transcripcion = event.results[event.results.length - 1][0].transcript;
                const ahora = Date.now();
                const tiempoDePausa = ahora - tiempoUltimaFrase;

                log(`🎤 Escuchado: "${transcripcion}"`);
                
                const paquete = {
                    ticketId: ticketId,
                    texto: transcripcion,
                    tiempoDePausa: tiempoDePausa
                };

                // Enviamos el ticket al servidor (main.js)
                wsAWS.send(JSON.stringify({ tipo: 'paquete', payload: paquete }));
                
                ticketId++;
                tiempoUltimaFrase = Date.now();
            };

            recon.onend = () => recon.start(); 
            recon.start();
            log("Micrófono abierto y capturando...");
        }

        async function reproducirAudioBase64(base64String) {
            // Conversor de PCM 16-bit nativo de Inworld a Audio web
            const binaryString = window.atob(base64String);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 32768.0; 
            }

            const audioBuffer = audioContext.createBuffer(1, float32Array.length, 24000);
            audioBuffer.getChannelData(0).set(float32Array);

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            source.start();
        }
    </script>
</body>
</html>
