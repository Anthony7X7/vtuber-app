<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Mobile Interface v3.2</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 40px; margin: 0; }
        button { font-size: 20px; padding: 20px 40px; border-radius: 12px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); margin-top: 20px; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        #estado { margin-top: 30px; font-size: 18px; color: #aaa; }
        #logBox { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #00ff88; text-align: left; height: 250px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <h2>🎙️ Departamento de Voz Móvil</h2>
    <p style="color: #00ff88; font-size: 12px;">Versión: 3.2 - Motor: AssemblyAI (Mensajero AWS)</p>
    
    <button id="btnConectar">CONECTAR SISTEMA</button>
    <p id="estado">Esperando conexión...</p>
    
    <div id="logBox">Esperando inicio...<br></div>

    <script>
        const AWS_WSS_URL = "wss://footage-downloaded-trades-earliest.trycloudflare.com";
        
        let wsAWS, wsAAI;
        let playContext, captureContext;
        let ticketId = 0;
        let tiempoUltimaFrase = Date.now();
        let nextPlayTime = 0; 

        function log(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('btnConectar').addEventListener('click', async () => {
            document.getElementById('btnConectar').disabled = true;
            log("Iniciando motores de audio...");
            
            playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            if (playContext.state === 'suspended') await playContext.resume();

            wsAWS = new WebSocket(AWS_WSS_URL);
            
            wsAWS.onopen = () => {
                log("✅ Conexión establecida con AWS.");
                document.getElementById('estado').innerText = "AWS Enlazado. Esperando Credenciales...";
            };

            wsAWS.onmessage = async (event) => {
                const mensaje = JSON.parse(event.data);
                
                // AWS nos mandó la llave en privado
                if (mensaje.tipo === 'llave_maestra') {
                    log("🔑 Llave recibida. Abriendo IA...");
                    iniciarAssemblyAI(mensaje.payload);
                }

                if (mensaje.tipo === 'audio') {
                    reproducirAudioBase64(mensaje.payload);
                }
            };

            wsAWS.onerror = () => log("❌ Falló la conexión con AWS.");
            wsAWS.onclose = () => {
                document.getElementById('estado').innerText = "🔴 Desconectado de AWS";
                document.getElementById('estado').style.color = "#ff4444";
                log("⚠️ Conexión AWS cerrada.");
                document.getElementById('btnConectar').disabled = false;
            };
        });

        function iniciarAssemblyAI(apiKey) {
            log("Conectando a AssemblyAI...");
            // Usamos la URL limpia
            wsAAI = new WebSocket("wss://api.assemblyai.com/v2/realtime/ws?sample_rate=16000");

            wsAAI.onopen = () => {
                // Pasamos la llave internamente como en la v3.0
                wsAAI.send(JSON.stringify({ terminate_session: false, token: apiKey }));
                document.getElementById('estado').innerText = "🟢 SISTEMA ONLINE - ¡Habla!";
                document.getElementById('estado').style.color = "#00ff88";
                log("🚀 AssemblyAI conectado exitosamente.");
                iniciarMicrofono();
            };

            wsAAI.onmessage = (event) => {
                const res = JSON.parse(event.data);
                
                if (res.error) {
                    log("❌ Error AAI: " + res.error);
                    return;
                }

                if (res.message_type === 'FinalTranscript' && res.text) {
                    const ahora = Date.now();
                    const tiempoDePausa = ahora - tiempoUltimaFrase;

                    log(`🎤 AAI: "${res.text}"`);

                    const paquete = { ticketId: ticketId, texto: res.text, tiempoDePausa: tiempoDePausa };

                    if (wsAWS && wsAWS.readyState === WebSocket.OPEN) {
                        wsAWS.send(JSON.stringify({ tipo: 'paquete', payload: paquete }));
                        ticketId++;
                    }
                    tiempoUltimaFrase = Date.now();
                }
            };

            wsAAI.onerror = () => log("❌ Falló la conexión con AssemblyAI.");
            wsAAI.onclose = () => log("🔌 AssemblyAI desconectado.");
        }

        async function iniciarMicrofono() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log("🎙️ Micrófono capturando...");

                captureContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                await captureContext.resume();

                const source = captureContext.createMediaStreamSource(stream);
                const processor = captureContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(captureContext.destination);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }

                    if (wsAAI && wsAAI.readyState === WebSocket.OPEN) {
                        const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));
                        wsAAI.send(JSON.stringify({ audio_data: base64Audio }));
                    }
                };
            } catch (err) {
                log("❌ Error de micrófono: " + err.message);
                alert("No se pudo acceder al micrófono.");
            }
        }

        async function reproducirAudioBase64(base64String) {
            try {
                const binaryString = window.atob(base64String);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 32768.0; 

                const audioBuffer = playContext.createBuffer(1, float32Array.length, 24000);
                audioBuffer.getChannelData(0).set(float32Array);

                const source = playContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(playContext.destination);
                
                const currentTime = playContext.currentTime;
                
                if (nextPlayTime < currentTime) nextPlayTime = currentTime;
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
                
            } catch (e) {
                console.error("Error al procesar chunk de audio", e);
            }
        }
    </script>
</body>
</html>
