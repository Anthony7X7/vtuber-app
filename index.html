<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Mobile Interface v2</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 40px; margin: 0; }
        button { font-size: 20px; padding: 20px 40px; border-radius: 12px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); }
        button:active { transform: scale(0.95); }
        #estado { margin-top: 30px; font-size: 18px; color: #aaa; }
        #logBox { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #00ff88; text-align: left; height: 200px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <h2>🎙️ Departamento de Voz Móvil</h2>
    <p style="color: #00ff88; font-size: 12px;">Versión: 2.0 - Cola de Audio Activa</p>
    <button id="btnConectar">CONECTAR SISTEMA</button>
    <p id="estado">Esperando conexión...</p>
    
    <div id="logBox">Esperando inicio...<br></div>

    <script>
        // ✅ URL ACTUALIZADA CON TU TÚNEL ETERNO
        const AWS_WSS_URL = "wss://footage-downloaded-trades-earliest.trycloudflare.com";
        
        let wsAWS;
        let audioContext;
        let ticketId = 0;
        let tiempoUltimaFrase = Date.now();
        let nextPlayTime = 0; 

        function log(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('btnConectar').addEventListener('click', async () => {
            log("Iniciando motor de audio...");
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            wsAWS = new WebSocket(AWS_WSS_URL);
            
            wsAWS.onopen = () => {
                document.getElementById('estado').innerText = "🟢 Sistema Enlazado";
                document.getElementById('estado').style.color = "#00ff88";
                log("✅ Conexión establecida con AWS.");
                log("🚀 Sistema de cola de audio v2 listo.");
                iniciarEscucha();
            };

            wsAWS.onmessage = async (event) => {
                const mensaje = JSON.parse(event.data);
                if (mensaje.tipo === 'audio') {
                    reproducirAudioBase64(mensaje.payload);
                }
            };

            wsAWS.onclose = () => {
                document.getElementById('estado').innerText = "🔴 Desconectado";
                document.getElementById('estado').style.color = "#ff4444";
                log("⚠️ Conexión cerrada.");
            };
        });

        function iniciarEscucha() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                log("❌ Error: Navegador no compatible.");
                return;
            }

            const recon = new SpeechRecognition();
            recon.continuous = true;
            recon.interimResults = false;
            recon.lang = 'es-ES';

            recon.onresult = (event) => {
                const transcripcion = event.results[event.results.length - 1][0].transcript;
                const ahora = Date.now();
                const tiempoDePausa = ahora - tiempoUltimaFrase;

                log(`🎤 Escuchado: "${transcripcion}"`);
                
                const paquete = {
                    ticketId: ticketId,
                    texto: transcripcion,
                    tiempoDePausa: tiempoDePausa
                };

                wsAWS.send(JSON.stringify({ tipo: 'paquete', payload: paquete }));
                
                ticketId++;
                tiempoUltimaFrase = Date.now();
            };

            recon.onend = () => recon.start(); 
            recon.start();
            log("🎙️ Micrófono activo.");
        }

        async function reproducirAudioBase64(base64String) {
            try {
                const binaryString = window.atob(base64String);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) {
                    float32Array[i] = int16Array[i] / 32768.0; 
                }

                const audioBuffer = audioContext.createBuffer(1, float32Array.length, 24000);
                audioBuffer.getChannelData(0).set(float32Array);

                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                
                const currentTime = audioContext.currentTime;
                
                if (nextPlayTime < currentTime) {
                    nextPlayTime = currentTime;
                }

                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
                
            } catch (e) {
                console.error("Error al procesar chunk de audio", e);
            }
        }
    </script>
</body>
</html>
