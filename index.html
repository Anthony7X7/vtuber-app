<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkie-Talkie</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 40px; margin: 0; }
        button { font-size: 20px; padding: 20px 40px; border-radius: 12px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); margin-top: 10px; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        #estado { margin-top: 20px; font-size: 18px; color: #aaa; }
        #logBox { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #00ff88; text-align: left; height: 200px; overflow-y: auto; border: 1px solid #333; }
        
        /* Estilos para el slider de volumen */
        .slider-container { margin-top: 25px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        input[type=range] { width: 90%; margin-top: 10px; accent-color: #00ff88; }
    </style>
</head>
<body>
    <h2>🎙️ Walkie-Talkie VTuber</h2>
    <p style="color: #00ff88; font-size: 12px;">AWS Core | 100ms | Ruido Blanco | Modo Sigilo</p>
    
    <button id="btnConectar">CONECTAR A LA BASE</button>
    <p id="estado">Esperando conexión...</p>

    <div class="slider-container">
        <label for="volumenSlider" style="color: #aaa; font-size: 14px;">Boost de Volumen: <strong id="volumenValor" style="color: #00ff88;">1.0x</strong></label><br>
        <input type="range" id="volumenSlider" min="1.0" max="3.0" step="0.1" value="1.0">
    </div>
    
    <div id="logBox">Sistemas en espera...<br></div>

    <script>
        const AWS_WSS_URL = "wss://footage-downloaded-trades-earliest.trycloudflare.com";
        
        let wsAWS;
        let playContext, captureContext;
        let nextPlayTime = 0; 
        let amplificador; 

        function log(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        // --- AUDIO WORKLET (Buffer de 100ms) ---
        const workletCode = `
            class MicProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this._buf = new Int16Array(1600); 
                    this._pos = 0;
                }
                process(inputs) {
                    const ch = inputs[0]?.[0];
                    if (!ch) return true;
                    for (let i = 0; i < ch.length; i++) {
                        this._buf[this._pos++] = Math.max(-1, Math.min(1, ch[i])) * 0x7FFF;
                        if (this._pos === 1600) {
                            this.port.postMessage(this._buf.buffer.slice(0));
                            this._pos = 0;
                        }
                    }
                    return true;
                }
            }
            registerProcessor('mic-processor', MicProcessor);
        `;
        const workletBlob = new Blob([workletCode], { type: 'application/javascript' });
        const workletUrl = URL.createObjectURL(workletBlob);
        // ----------------------------------------

        document.getElementById('btnConectar').addEventListener('click', async () => {
            document.getElementById('btnConectar').disabled = true;
            log("Iniciando motores con protección de fondo...");
            
            playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            if (playContext.state === 'suspended') await playContext.resume();

            // 1. INSTALAMOS EL VOLUMEN (Arranca en 1.0)
            amplificador = playContext.createGain();
            amplificador.gain.value = parseFloat(document.getElementById('volumenSlider').value); 
            amplificador.connect(playContext.destination);

            // Escuchamos si mueves el slider para subir o bajar el volumen en tiempo real
            document.getElementById('volumenSlider').addEventListener('input', (e) => {
                const nuevoVolumen = parseFloat(e.target.value);
                amplificador.gain.value = nuevoVolumen;
                document.getElementById('volumenValor').innerText = nuevoVolumen.toFixed(1) + 'x';
            });

            // 2. RUIDO BLANCO (Mantiene vivo a Chrome)
            const bufferSize = playContext.sampleRate * 2;
            const noiseBuffer = playContext.createBuffer(1, bufferSize, playContext.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.0001; 
            const noiseSource = playContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;
            noiseSource.connect(playContext.destination); 
            noiseSource.start();

            // 3. MEDIA SESSION API (Modo Sigilo "Pasar Piola")
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Musica', 
                    artist: ' '
                });
                navigator.mediaSession.playbackState = 'playing';
            }

            wsAWS = new WebSocket(AWS_WSS_URL);
            
            wsAWS.onopen = () => {
                log("✅ Conectado a AWS.");
                document.getElementById('estado').innerText = "🟢 SISTEMA EN LÍNEA";
                document.getElementById('estado').style.color = "#00ff88";
                iniciarMicrofono();
            };

            wsAWS.onmessage = async (event) => {
                const mensaje = JSON.parse(event.data);
                if (mensaje.tipo === 'log') log(mensaje.payload);
                if (mensaje.tipo === 'audio') reproducirAudioBase64(mensaje.payload);
            };

            wsAWS.onerror = () => log("❌ Falló la conexión con AWS.");
            wsAWS.onclose = () => {
                document.getElementById('estado').innerText = "🔴 Base Desconectada";
                document.getElementById('estado').style.color = "#ff4444";
                document.getElementById('btnConectar').disabled = false;
            };
        });

        async function iniciarMicrofono() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 } 
                });
                log("🎙️ Micrófono activo...");

                captureContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                await captureContext.resume();
                
                await captureContext.audioWorklet.addModule(workletUrl);
                
                const source = captureContext.createMediaStreamSource(stream);
                const processorNode = new AudioWorkletNode(captureContext, 'mic-processor');

                processorNode.port.onmessage = (e) => {
                    if (wsAWS && wsAWS.readyState === WebSocket.OPEN) {
                        const base64Audio = btoa(String.fromCharCode(...new Uint8Array(e.data)));
                        wsAWS.send(JSON.stringify({ tipo: 'audio_mic', payload: base64Audio }));
                    }
                };

                source.connect(processorNode);
                
            } catch (err) {
                log("❌ Error de micrófono: " + err.message);
                alert("Permisos de micrófono denegados.");
            }
        }

        async function reproducirAudioBase64(base64String) {
            try {
                const binaryString = window.atob(base64String);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 32768.0; 

                const audioBuffer = playContext.createBuffer(1, float32Array.length, 24000);
                audioBuffer.getChannelData(0).set(float32Array);

                const source = playContext.createBufferSource();
                source.buffer = audioBuffer;
                
                // Conectado al amplificador (que está en 1.0 por defecto)
                source.connect(amplificador);
                
                if (nextPlayTime < playContext.currentTime) nextPlayTime = playContext.currentTime;
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
            } catch (e) {
                console.error("Error reproduciendo", e);
            }
        }
    </script>
</body>
</html>
